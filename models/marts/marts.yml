version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique

  - name: dim_sellers
    columns:
      - name: seller_id
        data_tests:
          - not_null
          - unique

  - name: fct_orders
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique

      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

  - name: fct_order_items
    columns:
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id

      - name: product_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: seller_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_sellers')
                field: seller_id